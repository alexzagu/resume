  sections:
    Résumé:
      - Développeur iOS Senior avec plus de 6 ans de livraison d'applications iOS et tvOS natives, depuis la direction d'une équipe multidisciplinaire chez Lightspeed jusqu'à la promotion de l'adoption de SwiftUI et de la culture de test chez Rakuten Viki. Apporte une portée supplémentaire grâce à une expérience full-stack et de fondation de startup, avec un accent constant sur l'impact mesurable pour les utilisateurs et l'ingénierie.

    Expérience:
      - company: EasyBroker
        position: Développeur Full Stack Senior
        start_date: 2025-02
        end_date: 2025-08
        location: Monterrey, Mexique
        highlights:
          - Assumé un rôle full-stack post-startup, construisant un système de webhooks partenaires qui a permis la synchronisation en temps réel de milliers d'enregistrements de propriétés dans une application Rails

      - company: Permi
        position: Développeur Full Stack (Co-Fondateur)
        start_date: 2024-02
        end_date: 2025-02
        location: Monterrey, Mexique
        highlights:
          - Conçu et livré une application Rails full-stack — backend, infrastructure GCP, et fonctionnalités produit principales — grandissant jusqu'à 10 entreprises payantes et atteignant la finale du processus de sélection de Platanus Ventures

      - company: Rakuten Viki
        position: Développeur iOS & tvOS Senior
        start_date: 2022-04
        end_date: 2024-05
        location: Singapour
        highlights:
          - Dirigé l'adoption de SwiftUI en implémentant la première fonctionnalité de l'équipe construite avec cette technologie
          - Augmenté la testabilité de la base de code en introduisant un nouveau pattern de résolution de dépendances, rendant les unités significativement plus faciles à tester
          - Introduit le suivi de couverture de tests en intégrant Codecov, établissant une base de référence de ~12% pour appliquer des politiques de non-régression à l'avenir

      - company: Lightspeed HQ
        position: Développeur iOS Mid → Senior → Chef d'Équipe
        start_date: 2018-09
        end_date: 2021-12
        location: Gand, Belgique
        highlights:
          - Conçu et livré une nouvelle expérience de commande basée sur SwiftUI, obtenant des retours positifs de dizaines de clients
          - Augmenté les options de paiement en intégrant un nouveau processeur de paiement utilisant Combine
          - Construit une bibliothèque légère de tests snapshot qui abstrayait la génération complexe de permutations, permettant la suppression de milliers de lignes de code de test
          - Dirigé une équipe Core multidisciplinaire de plus de 7 ingénieurs en tant que Chef d'Équipe, animant tous les rituels incluant les standups quotidiens

    Projets:
      - name: "[Chalk & Chickpeas](https://chalkandchickpeas.com)"
        start_date: 2026-01
        end_date: present
        summary: Blog de voyage d'aventure avec moteur Ruby on Rails personnalisé
        highlights:
          - Conçu et développé un moteur de blog personnalisé en Ruby on Rails alimentant un blog de voyage d'aventure, déployé et maintenu de manière indépendante

