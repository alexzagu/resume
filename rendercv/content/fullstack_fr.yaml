          - Augmenté la satisfaction client en implémentant la génération personnalisable de flyers de propriétés dans l'application Rails
          - Simplifié l'UX de l'extension Chrome en supprimant l'exigence de clé API de l'authentification
          - Amélioré la satisfaction du support client en intégrant des outils d'identification des utilisateurs dans l'extension Chrome

